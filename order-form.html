<script>
var LIFF_ID = "2010594759-au1Q9BfR";
var CFG = {"depts": [{"name": "สถานที่และโครงสร้าง", "key": "venue", "graphic": false}, {"name": "เส้นทางและจุดบริการ", "key": "route", "graphic": false}, {"name": "ควบคุมการแข่งขัน", "key": "race", "graphic": false}, {"name": "บริการนักวิ่ง", "key": "runner", "graphic": false}, {"name": "ศูนย์งานกราฟิก", "key": "graphic", "graphic": true}, {"name": "การตลาดและสื่อ", "key": "marketing", "graphic": false}, {"name": "จัดซื้อและประสานงาน", "key": "procurement", "graphic": false}, {"name": "ไอทีและระบบ", "key": "it", "graphic": false}, {"name": "การแพทย์และกู้ภัย", "key": "medical", "graphic": false}], "schemas": {"graphic": {"subtypes": {"ป้าย": [{"key": "วัสดุ", "label": "วัสดุ", "required": true, "choices": ["ไวนิล", "ฟิวเจอร์บอร์ด", "สติกเกอร์", "อิงค์เจ็ท"], "number": false}, {"key": "ขนาด", "label": "ขนาด (กว้างxสูง)", "required": true, "choices": null, "number": false}, {"key": "จำนวน", "label": "จำนวน", "required": true, "choices": null, "number": true}, {"key": "ใช้ที่ไหน/งานอะไร", "label": "ใช้ที่ไหน", "required": false, "choices": null, "number": false}], "เสื้อ": [{"key": "ประเภทเสื้อ", "label": "ประเภท", "required": true, "choices": ["staff", "นักวิ่ง", "finisher"], "number": false}, {"key": "จำนวน", "label": "จำนวน", "required": true, "choices": null, "number": true}, {"key": "สี", "label": "สี", "required": false, "choices": null, "number": false}, {"key": "ไซส์", "label": "ไซส์/อก", "required": false, "choices": null, "number": false}], "งานผลิต": [{"key": "สิ่งที่ผลิต", "label": "ผลิตอะไร", "required": true, "choices": null, "number": false}, {"key": "จำนวน", "label": "จำนวน", "required": true, "choices": null, "number": true}, {"key": "สเปค", "label": "สเปค/วัสดุ", "required": false, "choices": null, "number": false}], "digital": [{"key": "แพลตฟอร์ม", "label": "แพลตฟอร์ม", "required": true, "choices": ["facebook", "instagram", "line", "เว็บ"], "number": false}, {"key": "ขนาด/สัดส่วน", "label": "ขนาด/สัดส่วน", "required": false, "choices": null, "number": false}, {"key": "ใช้ที่ไหน/งานอะไร", "label": "ใช้ทำอะไร", "required": false, "choices": null, "number": false}]}}, "procurement": {"fields": [{"key": "รายการ", "label": "สั่งอะไร", "required": true, "choices": null, "number": false}, {"key": "จำนวน", "label": "จำนวน", "required": true, "choices": null, "number": true}, {"key": "ยี่ห้อ/รุ่น", "label": "ยี่ห้อ/รุ่น", "required": false, "choices": null, "number": false}, {"key": "ใช้เมื่อไหร่", "label": "ต้องใช้เมื่อไหร่", "required": false, "choices": null, "number": false}, {"key": "งบ", "label": "งบประมาณ", "required": false, "choices": null, "number": false}]}, "medical": {"fields": [{"key": "ประเภท", "label": "ต้องการอะไร", "required": true, "choices": ["รถพยาบาล", "ทีมแพทย์", "ยา/เวชภัณฑ์", "ทีมกู้ภัย", "ประสานงาน/อื่นๆ"], "number": false}, {"key": "จำนวน", "label": "จำนวน", "required": false, "choices": null, "number": true}, {"key": "จุด/พิกัด", "label": "ประจำจุดไหน", "required": false, "choices": null, "number": false}, {"key": "เมื่อไหร่", "label": "เมื่อไหร่", "required": false, "choices": null, "number": false}]}, "venue": {"fields": [{"key": "วันติดตั้ง", "label": "วันติดตั้ง", "required": true, "choices": null, "number": false}, {"key": "วันรื้อถอน", "label": "วันรื้อถอน", "required": false, "choices": null, "number": false}, {"key": "ขนาดพื้นที่/ขนาดบูธ", "label": "ขนาดพื้นที่/บูธ", "required": true, "choices": null, "number": false}, {"key": "สถานที่จัดงาน", "label": "สถานที่จัดงาน", "required": false, "choices": null, "number": false}, {"key": "จำนวน", "label": "จำนวน", "required": false, "choices": null, "number": true}]}, "route": {"fields": [{"key": "ช่วงกิโลเมตร", "label": "กม. ที่เท่าไหร่", "required": true, "choices": null, "number": false}, {"key": "รายละเอียดเส้นทาง", "label": "รายละเอียดการจราจร/เส้นทาง", "required": true, "choices": null, "number": false}, {"key": "จำนวนป้าย/กรวย", "label": "จำนวนอุปกรณ์", "required": false, "choices": null, "number": true}]}, "race": {"fields": [{"key": "ประเภทการแข่ง", "label": "ประเภทการแข่งขัน", "required": true, "choices": ["Trail", "Road", "Triathlon"], "number": false}, {"key": "ระยะทาง", "label": "ระยะทาง (กม.)", "required": true, "choices": null, "number": false}, {"key": "อุปกรณ์เทคนิค", "label": "อุปกรณ์เทคนิคที่ต้องการ", "required": false, "choices": null, "number": false}]}, "runner": {"fields": [{"key": "ปัญหา/เรื่องที่ติดต่อ", "label": "เรื่องที่ติดต่อ (BIB/ของรางวัล/เหรียญ)", "required": true, "choices": null, "number": false}, {"key": "ชื่อนักวิ่ง/BIB", "label": "ชื่อนักวิ่ง หรือ BIB", "required": false, "choices": null, "number": false}, {"key": "รายละเอียด", "label": "รายละเอียดปัญหา", "required": false, "choices": null, "number": false}]}, "marketing": {"fields": [{"key": "ช่องทาง", "label": "ช่องทางโฆษณา", "required": true, "choices": ["Facebook", "TikTok", "LINE", "Instagram", "Website", "งานอีเวนต์/ออนกราวด์"], "number": false}, {"key": "วัตถุประสงค์", "label": "วัตถุประสงค์แคมเปญ", "required": true, "choices": null, "number": false}, {"key": "งบประมาณ", "label": "งบประมาณโฆษณา", "required": false, "choices": null, "number": false}]}, "it": {"fields": [{"key": "ประเภทอุปกรณ์", "label": "อุปกรณ์หรือระบบที่มีปัญหา", "required": true, "choices": null, "number": false}, {"key": "อาการเสีย/ปัญหา", "label": "อาการเสียหรือความต้องการ", "required": true, "choices": null, "number": false}, {"key": "รหัสทรัพย์สิน", "label": "รหัสเครื่อง/รหัสทรัพย์สิน", "required": false, "choices": null, "number": false}]}}, "events": ["KPTC", "BRM", "CMUTMB", "TNT 2026"], "staff": ["IT Staff", "apisit", "nawakran"]};

var $ = function(id){ return document.getElementById(id); };
var deptEl=$('dept'), gtypeWrap=$('gtypeWrap'), gtypeEl=$('gtype'),
    fieldsEl=$('fields'), eventEl=$('event'), assigneeEl=$('assignee'),
    detailEl=$('detail'), urgentEl=$('urgent'), btn=$('send');

// static dropdowns
CFG.depts.forEach(function(d){ var o=document.createElement('option'); o.value=d.key; o.textContent=d.name; deptEl.appendChild(o); });
CFG.events.forEach(function(e){ var o=document.createElement('option'); o.value=e; o.textContent=e; eventEl.appendChild(o); });
CFG.staff.forEach(function(s){ var o=document.createElement('option'); o.value=s; o.textContent=s; assigneeEl.appendChild(o); });

function deptSchema(){ return CFG.schemas[deptEl.value] || null; }
function isGraphic(){ var d=CFG.depts.find(function(x){return x.key===deptEl.value;}); return d && d.graphic; }

// render field inputs for the chosen dept (or graphic subtype). id="f_<key>" so buildText can read them.
function renderFields(list){
  fieldsEl.innerHTML='';
  (list||[]).forEach(function(f){
    var lab=document.createElement('label'); lab.textContent=f.label; if(f.required) lab.className='req';
    fieldsEl.appendChild(lab);
    var inp;
    if(f.choices){ inp=document.createElement('select');
      var blank=document.createElement('option'); blank.value=''; blank.textContent='—'; inp.appendChild(blank);
      f.choices.forEach(function(c){ var o=document.createElement('option'); o.value=c; o.textContent=c; inp.appendChild(o); });
    } else { inp=document.createElement('input'); inp.type=f.number?'number':'text'; }
    inp.id='f_'+f.key; inp.dataset.label=f.label; inp.dataset.req=f.required?'1':'';
    inp.addEventListener('input',validate); inp.addEventListener('change',validate);
    fieldsEl.appendChild(inp);
  });
}

function currentFields(){
  var sc=deptSchema(); if(!sc) return [];
  if(sc.subtypes) return sc.subtypes[gtypeEl.value] || [];
  return sc.fields || [];
}

deptEl.addEventListener('change', function(){
  var sc=deptSchema();
  if(isGraphic() && sc && sc.subtypes){
    gtypeWrap.classList.remove('hide');
    gtypeEl.innerHTML='';
    Object.keys(sc.subtypes).forEach(function(st){ var o=document.createElement('option'); o.value=st; o.textContent=st; gtypeEl.appendChild(o); });
  } else { gtypeWrap.classList.add('hide'); }
  renderFields(currentFields()); validate();
});
gtypeEl.addEventListener('change', function(){ renderFields(currentFields()); validate(); });

// valid = dept chosen AND every required field filled
function validate(){
  var ok = !!deptEl.value;
  if(ok) fieldsEl.querySelectorAll('[data-req="1"]').forEach(function(el){ if(!String(el.value).trim()) ok=false; });
  btn.disabled=!ok;
}

// build clean [FORM] text -> existing pipeline parses "key: value" lines
function buildText(){
  var dept=CFG.depts.find(function(x){return x.key===deptEl.value;});
  var lines=['[FORM]','แผนก: '+(dept?dept.name:deptEl.value)];
  if(isGraphic()) lines.push('ประเภทงาน: '+gtypeEl.value);
  if(eventEl.value) lines.push('อีเวนต์: '+eventEl.value);
  currentFields().forEach(function(f){ var v=$('f_'+f.key); if(v && String(v.value).trim()) lines.push(f.key+': '+String(v.value).trim()); });
  if(assigneeEl.value) lines.push('มอบหมายให้: '+assigneeEl.value);
  if(urgentEl.checked) lines.push('ด่วน: ใช่');
  if(detailEl.value.trim()) lines.push('รายละเอียด: '+detailEl.value.trim());
  return lines.join('\n');
}

detailEl.addEventListener('input',validate);
btn.addEventListener('click', function(){
  btn.disabled=true; btn.textContent='กำลังส่ง...';
  liff.sendMessages([{type:'text',text:buildText()}])
    .then(function(){ liff.closeWindow(); })
    .catch(function(e){ btn.disabled=false; btn.textContent='ส่งเข้าระบบ'; alert('ส่งไม่สำเร็จ: '+(e&&e.message||e)); });
});

liff.init({liffId:LIFF_ID})
  .then(function(){ if(!liff.isLoggedIn()) liff.login(); })
  .catch(function(e){ alert('LIFF init พัง: '+(e&&e.message||e)+'\nตรวจ LIFF_ID'); });
</script>
