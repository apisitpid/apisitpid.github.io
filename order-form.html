// render one wrapper per field (id=w_<key>); conditional wrappers carry data-cond-* for show/hide
function renderFields(list){
  fieldsEl.innerHTML='';
  (list||[]).forEach(function(f){
    var w=document.createElement('div'); w.id='w_'+f.key;
    if(f.cond){ w.dataset.condField=f.cond.field; w.dataset.condVal=f.cond.val; w.dataset.condReq=f.cond.req?'1':''; }
    var lab=document.createElement('label'); lab.textContent=f.label; if(f.required) lab.className='req'; lab.id='l_'+f.key;
    w.appendChild(lab);
    var inp;
    if(f.choices){ inp=document.createElement('select');
      var blank=document.createElement('option'); blank.value=''; blank.textContent='—'; inp.appendChild(blank);
      f.choices.forEach(function(c){ var o=document.createElement('option'); o.value=c; o.textContent=c; if(c===f.default) o.selected=true; inp.appendChild(o); });
    } else { inp=document.createElement('input'); inp.type=f.number?'number':'text'; if(f.default) inp.value=f.default; }
    inp.id='f_'+f.key; inp.dataset.req=f.required?'1':'';
    inp.addEventListener('input',onChange); inp.addEventListener('change',onChange);
    w.appendChild(inp);
    if(f.note){ var h=document.createElement('div'); h.className='hint'; h.textContent=f.note; w.appendChild(h); }
    fieldsEl.appendChild(w);
  });
  applyConds();
}

// show/hide conditional fields based on their parent select; required only while visible
function applyConds(){
  fieldsEl.querySelectorAll('[data-cond-field]').forEach(function(w){
    var pe=$('f_'+w.dataset.condField);
    var show=pe && pe.value===w.dataset.condVal;
    w.classList.toggle('hide', !show);
    var inp=w.querySelector('input,select'), lab=w.querySelector('label');
    inp.dataset.req=(show && w.dataset.condReq==='1')?'1':'';
    if(lab) lab.className=inp.dataset.req==='1'?'req':'';
    if(!show){ if(inp.tagName==='SELECT') inp.selectedIndex=0; else inp.value=''; }
  });
}

function onChange(){ applyConds(); validate(); }

function visibleField(f){ var w=$('w_'+f.key); return w && !w.classList.contains('hide'); }

// valid = dept chosen AND visible required fields filled AND (free-form dept -> detail filled)
function validate(){
  var ok=!!deptEl.value;
  if(ok) fieldsEl.querySelectorAll('[data-req="1"]').forEach(function(el){
    var w=el.closest('div[id^="w_"]'); if(w && w.classList.contains('hide')) return;
    if(!String(el.value).trim()) ok=false; });
  if(ok && currentFields().length===0 && !detailEl.value.trim()) ok=false;  // free-form: detail required
  btn.disabled=!ok;
}

deptEl.addEventListener('change', function(){

  if(isGraphic() && sc && sc.subtypes){
    gtypeWrap.classList.remove('hide'); gtypeEl.innerHTML='';
    Object.keys(sc.subtypes).forEach(function(st){ var o=document.createElement('option'); o.value=st; o.textContent=st; gtypeEl.appendChild(o); });
  } else { gtypeWrap.classList.add('hide'); }
  renderFields(currentFields());
  var freeform = currentFields().length===0 && !!deptEl.value;  // non-graphic -> detail is the input
  detailLab.textContent = freeform ? 'รายละเอียดงาน' : 'รายละเอียดเพิ่มเติม';
  detailLab.className = freeform ? 'req' : '';
  detailEl.placeholder = freeform ? 'อธิบายงานที่ต้องการ — จำนวน/ขนาด/วันใช้ ถ้ามี (บอทจะถามเพิ่มถ้าขาด)' : 'ระบุอะไรก็ได้ที่ช่องด้านบนไม่ครอบคลุม';
  validate();
});
gtypeEl.addEventListener('change', function(){ renderFields(currentFields()); validate(); });
detailEl.addEventListener('input', validate);

// build clean [FORM] text -> pipeline parses "key: value" lines (keys match request_form_schema)
function buildText(){
  var dept=CFG.depts.find(function(x){return x.key===deptEl.value;});
  var lines=['[FORM]','แผนก: '+(dept?dept.name:deptEl.value)];
  if(isGraphic()) lines.push('ประเภทงาน: '+gtypeEl.value);
  if(eventEl.value) lines.push('อีเวนต์: '+eventEl.value);
  currentFields().forEach(function(f){ if(!visibleField(f)) return; var v=$('f_'+f.key); if(v && String(v.value).trim()) lines.push(f.key+': '+String(v.value).trim()); });
  if(assigneeEl.value) lines.push('มอบหมายให้: '+assigneeEl.value);
  if(urgentEl.checked) lines.push('ด่วน: ใช่');
  if(detailEl.value.trim()) lines.push('รายละเอียด: '+detailEl.value.trim());
  return lines.join('\n');
}

btn.addEventListener('click', function(){

  liff.sendMessages([{type:'text',text:buildText()}])
    .then(function(){ liff.closeWindow(); })
    .catch(function(e){ btn.disabled=false; btn.textContent='ส่งเข้าระบบ'; alert('ส่งไม่สำเร็จ: '+(e&&e.message||e)); });
});

liff.init({liffId:LIFF_ID})
  .then(function(){ if(!liff.isLoggedIn()) liff.login(); })
  .catch(function(e){ alert('LIFF init พัง: '+(e&&e.message||e)+'\nตรวจ LIFF_ID'); });
</script>
</body>
